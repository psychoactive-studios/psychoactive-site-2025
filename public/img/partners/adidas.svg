<!--
  Adidas Performance lockup approximation: 3-stripe peak + adidas
  wordmark side-by-side. Geometry is hand-coded so it's a credible
  approximation rather than a brand-accurate official asset.

  The wordmark uses a generic heavy sans-serif fallback chain — the
  real Adidas wordmark uses ITC Avant Garde Gothic Bold which isn't
  web-safe. If this needs to ship at production fidelity, swap this
  file for the official combined lockup from Adidas's brand centre.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="#d9d9d9">
  <!-- 3-stripe peak: parallelograms slanting up to the right, lengths
       stepping shorter going up to form the iconic mountain silhouette. -->
  <polygon points="0,58 60,58 78,42 18,42" />
  <polygon points="20,40 80,40 98,24 38,24" />
  <polygon points="40,22 100,22 118,6 58,6" />
  <!-- "adidas" wordmark, right of the peak. -->
  <text
    x="130"
    y="58"
    font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="46"
    letter-spacing="-2"
  >adidas</text>
</svg>
